<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Write</title>
<link rel="stylesheet" href="./WordWrite.css" type="text/css">
</head>
<body>

<div id="topBar">
  <button onclick="backToHome()">Back to Home</button>
</div>

<div id="stats" style="display:none;">
  <div>Words Typed: <span id="score">0</span></div>
  <div>Mistakes: <span id="mistakes">0</span></div>
  <div>Accuracy: <span id="accuracy">0%</span></div>
  <div>WPS: <span id="wps">0</span></div>
</div>

<div id="gameOverModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Game Over</h2>
    <div class="modal-stats">
      <div>Words Typed: <span id="gameOverScore">0</span></div>
      <div>Mistakes: <span id="gameOverMistakes">0</span></div>
      <div>Accuracy: <span id="gameOverAccuracy">0%</span></div>
      <div>WPS: <span id="gameOverWps">0</span></div>
    </div>
    <button id="okBtn" onclick="closeGameOver()">OK</button>
  </div>
</div>

<div id="container">
  <h1 id="title">Word Write</h1>
  <label id="label">Words to Type</label>
  <input type="number" id="wordsInput" value="10" min="5" max="100" />
  <button id="mainBtn" onclick="startGame()">START GAME</button>
</div>

<div id="gameArea" style="display:none;">
  <div id="wordDisplay"></div>
  <input type="text" id="wordInput" placeholder="Type here..." autofocus />
</div>

<script src="WordWrite.js"></script>
</body>
</html>
