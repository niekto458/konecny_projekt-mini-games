<!DOCTYPE html>
<html lang="en">
<head>

  <title>Reaction Test</title>
  <link rel="stylesheet" href="reaction.css">
</head>
<body>

<div class="wrapper">

  <aside class="panel">

    <label>

    <div id="box"></div>
  </main>

</div>

<script src="reaction.js"></script>

</html>
