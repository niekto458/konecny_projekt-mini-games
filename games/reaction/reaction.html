<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reaction</title>
  <link rel="stylesheet" href="reaction.css">
</head>
<body>

<div class="wrapper">

  <!-- SETTINGS -->
  <aside class="panel">
    <h1>Reaction</h1>

    <label>
      Time (seconds)
      <input type="number" id="timeInput" value="10" min="1">
    </label>

    <button id="start">START GAME</button>

    <a href="../../index.html" class="back">← Back</a>
  </aside>

  <!-- GAME -->
  <main class="game">

    <div id="ready">
      Click <span>START GAME</span> to begin
    </div>

    <div id="hud" class="hidden">
      <div>Score<br><span id="score">0</span></div>
      <div>Time<br><span id="time">0</span></div>
    </div>

    <div id="box" class="hidden"></div>

  </main>

</div>

<script src="reaction.js"></script>
</body>
</html>
