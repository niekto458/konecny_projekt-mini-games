<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Game</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #1a0033, #000);
  color: white;
}

#container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  width: 200px;
  text-align: center;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: linear-gradient(45deg, #a855f7, #6b21a8);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.7);
}

#topBar {
  position: absolute;
  top: 20px;
  right: 20px;
}

#stats {
  position: absolute;
  top: 20px;
  left: 20px;
}
</style>
</head>
<body>

<div id="topBar" style="display:none;">
  <button onclick="backToHome()">Back to Home</button>
</div>

<div id="stats" style="display:none;">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">0</span></div>
</div>

<div id="container">
  <h1 id="title">Clicker</h1>
  <label id="label">Time (seconds)</label>
  <input type="number" id="timeInput" value="10" />
  <button id="mainBtn" onclick="startGame()">START GAME</button>
</div>

<script>
let score = 0;
let timeLeft = 0;
let timer;
let gameRunning = false;

function startGame() {
  score = 0;
  timeLeft = parseInt(document.getElementById('timeInput').value);
  gameRunning = true;

  // Change UI
  document.getElementById('title').style.display = 'none';
  document.getElementById('label').style.display = 'none';
  document.getElementById('timeInput').style.display = 'none';

  document.getElementById('topBar').style.display = 'block';
  document.getElementById('stats').style.display = 'block';

  // Turn START button into CLICK button
  const btn = document.getElementById('mainBtn');
  btn.textContent = 'CLICK';
  btn.onclick = increaseScore;

  updateUI();

  timer = setInterval(() => {
    timeLeft--;
    updateUI();

    if (timeLeft <= 0) {
      clearInterval(timer);
      alert('Game Over! Your score: ' + score);
      backToMenu();
    }
  }, 1000);
}

function increaseScore() {
  if (gameRunning && timeLeft > 0) {
    score++;
    updateUI();
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('time').textContent = timeLeft;
}

function backToHome() {
  clearInterval(timer);
  gameRunning = false;
  window.location.href = '../../index.html';
}

function backToMenu() {
  clearInterval(timer);
  gameRunning = false;

  // Reset UI
  document.getElementById('title').style.display = 'block';
  document.getElementById('label').style.display = 'block';
  document.getElementById('timeInput').style.display = 'block';

  document.getElementById('topBar').style.display = 'none';
  document.getElementById('stats').style.display = 'none';

  const btn = document.getElementById('mainBtn');
  btn.textContent = 'START GAME';
  btn.onclick = startGame;

  document.getElementById('score').textContent = 0;
  document.getElementById('time').textContent = 0;
}
</script>

</body>
</html>
