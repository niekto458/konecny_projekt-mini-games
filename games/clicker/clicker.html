<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Game</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #1a0033, #000);
  color: white;
}

#container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  width: 200px;
  text-align: center;
}

button {
  padding: 20px 60px;
  font-size: 22px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: linear-gradient(45deg, #a855f7, #6b21a8);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.7);
}

#topBar {
  position: absolute;
  top: 20px;
  right: 20px;
}

#stats {
  position: absolute;
  top: 20px;
  left: 20px;
}

.modal {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.75);
  z-index: 1000;
}

.modal-content {
  background: linear-gradient(180deg, rgba(30,5,65,0.98), rgba(15,0,30,0.98));
  border: 2px solid rgba(157,78,221,0.85);
  border-radius: 24px;
  padding: 28px 32px;
  width: min(90%, 420px);
  text-align: center;
  box-shadow: 0 0 40px rgba(157,78,221,0.35);
}

.modal-content h2 {
  margin-bottom: 18px;
  font-size: 2rem;
  color: #e9d5ff;
}

.modal-stats {
  display: grid;
  gap: 12px;
  margin-bottom: 24px;
  font-size: 18px;
  color: #f3e8ff;
}

.modal-content button {
  width: 120px;
  padding: 12px 0;
  font-size: 18px;
  border-radius: 14px;
  background: linear-gradient(45deg, #a855f7, #6b21a8);
  color: white;
  border: none;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(168,85,247,0.55);
}
</style>
</head>
<body>

<div id="topBar">
  <button onclick="backToHome()">Back to Home</button>
</div>

<div id="stats" style="display:none;">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">0</span></div>
</div>

<div id="gameOverModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Game Over</h2>
    <div class="modal-stats">
      <div>Score: <span id="gameOverScore">0</span></div>
      <div>Time elapsed: <span id="gameOverTime">0</span></div>
    </div>
    <button id="okBtn" onclick="closeGameOver()">OK</button>
  </div>
</div>

<div id="container">
  <h1 id="title">Clicker</h1>
  <label id="label">Time (seconds)</label>
  <input type="number" id="timeInput" value="10" />
  <button id="mainBtn" onclick="startGame()">START GAME</button>
</div>

<script>
let score = 0;
let timeLeft = 0;
let timer;
let gameRunning = false;
const gameOverModal = document.getElementById('gameOverModal');
const gameOverScore = document.getElementById('gameOverScore');
const gameOverTime = document.getElementById('gameOverTime');

function startGame() {
  score = 0;
  timeLeft = parseInt(document.getElementById('timeInput').value);
  gameRunning = true;

  // Change UI
  document.getElementById('title').style.display = 'none';
  document.getElementById('label').style.display = 'none';
  document.getElementById('timeInput').style.display = 'none';

  document.getElementById('stats').style.display = 'block';

  // Turn START button into CLICK button
  const btn = document.getElementById('mainBtn');
  btn.textContent = 'CLICK';
  btn.onclick = increaseScore;

  updateUI();

  timer = setInterval(() => {
    timeLeft--;
    updateUI();

    if (timeLeft <= 0) {
      clearInterval(timer);
      showGameOver();
    }
  }, 1000);
}

function showGameOver() {
  gameRunning = false;
  gameOverScore.textContent = score;
  gameOverTime.textContent = parseInt(document.getElementById('timeInput').value, 10) || 0;
  gameOverModal.style.display = 'flex';
}

function closeGameOver() {
  gameOverModal.style.display = 'none';
  backToMenu();
}

function increaseScore() {
  if (gameRunning && timeLeft > 0) {
    score++;
    updateUI();
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('time').textContent = timeLeft;
}

function backToHome() {
  clearInterval(timer);
  gameRunning = false;
  window.location.href = '../../index.html';
}

function backToMenu() {
  clearInterval(timer);
  gameRunning = false;

  // Reset UI
  document.getElementById('title').style.display = 'block';
  document.getElementById('label').style.display = 'block';
  document.getElementById('timeInput').style.display = 'block';

  document.getElementById('stats').style.display = 'none';

  const btn = document.getElementById('mainBtn');
  btn.textContent = 'START GAME';
  btn.onclick = startGame;

  document.getElementById('score').textContent = 0;
  document.getElementById('time').textContent = 0;
}
</script>

</body>
</html>
