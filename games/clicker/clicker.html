<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Game</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #1a0033, #000);
  color: white;
}

.hidden { display: none; }

/* Centered Menu */
#menu {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  width: 200px;
  text-align: center;
}

button {
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(45deg, #a855f7, #6b21a8);
  color: white;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.7);
}

/* Game Screen */
#game {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#topBar {
  position: absolute;
  top: 20px;
  right: 20px;
}

#stats {
  position: absolute;
  top: 20px;
  left: 20px;
}

#clickBtn {
  padding: 40px 80px;
  font-size: 24px;
  border-radius: 20px;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>Clicker</h1>
  <label>Time (seconds)</label>
  <input type="number" id="timeInput" value="10" />
  <button onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="topBar">
    <button onclick="backToMenu()">Back to Menu</button>
  </div>

  <div id="stats">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">0</span></div>
  </div>

  <button id="clickBtn" onclick="increaseScore()">CLICK</button>
</div>

<script>
let score = 0;
let timeLeft = 0;
let timer;

function startGame() {
  score = 0;
  timeLeft = parseInt(document.getElementById('timeInput').value);

  document.getElementById('menu').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');

  updateUI();

  timer = setInterval(() => {
    timeLeft--;
    updateUI();

    if (timeLeft <= 0) {
      clearInterval(timer);
      alert('Game Over! Your score: ' + score);
      backToMenu();
    }
  }, 1000);
}

function increaseScore() {
  if (timeLeft > 0) {
    score++;
    updateUI();
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('time').textContent = timeLeft;
}

function backToMenu() {
  clearInterval(timer);
  document.getElementById('game').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
}
</script>

</body>
</html>
