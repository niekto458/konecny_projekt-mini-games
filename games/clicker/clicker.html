<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clicker</title>
  <link rel="stylesheet" href="clicker.css">
</head>
<body>

<div class="wrapper">

  <!-- LEFT: SETTINGS -->
  <aside class="panel">
    <h1>Clicker</h1>

    <label>
      Time (seconds)
      <input type="number" id="timeInput" value="10" min="1">
    </label>

    <button id="start">START GAME</button>

    <a href="../../index.html" class="back">← Back</a>
  </aside>

  <!-- RIGHT: GAME -->
  <main class="game">
    <div class="stats">
      <div>Score<br><span id="score">0</span></div>
      <div>Time<br><span id="time">0</span></div>
    </div>

    <button id="clickBtn">CLICK</button>
  </main>

</div>

<script src="clicker.js"></script>
</body>
</html>
