<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clicker</title>
  <link rel="stylesheet" href="clicker.css">
</head>
<body>

<div class="container">
  <h1>Clicker</h1>

  <div class="settings">
    <label>
      Time (seconds)
      <input type="number" id="timeInput" value="10" min="1">
    </label>
    <button id="start">START</button>
  </div>

  <p>Score: <span id="score">0</span></p>
  <p>Time: <span id="time">0</span></p>

  <button id="clickBtn" class="main">CLICK</button>

  <a href="../../index.html" class="back">← Back</a>
</div>

<script src="clicker.js"></script>
</body>
</html>
