<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Trainer</title>
<link rel="stylesheet" href="aim.css">
</head>
<body>

<div id="topBar">
  <button onclick="backToHome()">Back to Home</button>
</div>

<div id="stats" style="display:none;">
  <div>Score: <span id="score">0</span></div>
  <div>Time: <span id="time">0</span></div>
</div>

<div id="container">
  <h1 id="title">Aim Trainer</h1>
  <label id="label">Time (seconds)</label>
  <input type="number" id="timeInput" value="10" min="5" max="120" />
  <label id="label2">Difficulty</label>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="extreme">Extreme</option>
  </select>
  <button id="mainBtn" onclick="startGame()">START GAME</button>
</div>

<div id="arena" style="display:none;">
  <div id="target"></div>
</div>

<script src="aim.js"></script>
</body>
</html>
