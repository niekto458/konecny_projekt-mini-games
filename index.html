<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎮 Mini Games</h1>
  <p>Choose your challenge</p>
</header>

<main>
  <div class="grid">

    <div class="card" onclick="openGame('games/clicker/clicker.html')">
      <h2>Clicker</h2>
      <p>Click as fast as you can</p>
      <span class="play">▶ PLAY</span>
    </div>

    <div class="card" onclick="openGame('games/reaction/reaction.html')">
      <h2>Reaction Test</h2>
      <p>Test your reflexes</p>
      <span class="play">▶ PLAY</span>
    </div>

    <div class="card" onclick="openGame('games/aim/aim.html')">
      <h2>Aim Trainer</h2>
      <p>Hit the target fast</p>
      <span class="play">▶ PLAY</span>
    </div>

    <div class="card" onclick="openGame('games/dodge/dodge.html')">
      <h2>Dodge the Blocks</h2>
      <p>Survive as long as you can</p>
      <span class="play">▶ PLAY</span>
    </div>

  </div>
</main>

<script>
  function openGame(path) {
    window.location.href = path;
  }
</script>

</body>
</html>
